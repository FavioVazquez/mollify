description = "Build the module dependency graph (add --mermaid for a diagram)"
prompt = """
You are reviewing this repository with Mollify, a deterministic Python
code-intelligence engine. The dependency graph is computed from static imports.

Here is the current graph output (Graphviz DOT):
!{mollify graph {{args}}}

Using ONLY this output (do not grep, do not guess):

1. Summarize the graph: number of modules and edges, highly-connected hubs, and
   any cycles (cross-reference `mollify arch` for `circular-dependency` findings).
2. If the user wants a visual, note that `mollify graph --mermaid` emits a
   Mermaid diagram.
3. Do NOT modify files — this is read-only analysis. The graph is built from
   static imports; dynamic imports may not appear.
"""
