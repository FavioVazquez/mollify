name: CI

# Security note: pinning third-party actions to full commit SHAs (rather than
# mutable tags) is recommended. Dependabot (.github/dependabot.yml) tracks
# action updates.

on:
  push:
    branches: [main, research-and-plan]
  pull_request:

# Least privilege by default; the SARIF upload job widens its own scope below.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build · test · clippy · fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Version consistency (workspace / crate deps)
        shell: bash
        run: ./scripts/check-versions.sh
      # The cross-platform report contract: identical trees must produce the
      # identical fingerprint set with `/`-separated paths on every OS — this
      # is what makes baselines portable between Linux CI and dev laptops.
      - name: Cross-platform report contract (sample project)
        shell: bash
        run: |
          cargo run -q -p mollify-cli -- audit --path cookbook/sample-project --format json > sample.json
          if jq -r '.findings[].location.path' sample.json | grep -qF '\'; then
            echo "::error::backslash leaked into location.path"; exit 1
          fi
          jq -r '.findings[].fingerprint' sample.json | sort > got.txt
          diff -u cookbook/sample-project/expected-fingerprints.txt got.txt \
            || { echo "::error::fingerprint set drifted from the golden list — if the change is intentional, regenerate cookbook/sample-project/expected-fingerprints.txt"; exit 1; }
          echo "$(wc -l < got.txt) fingerprints match the golden set"

  self-audit:
    name: mollify audits a sample project (dogfood)
    runs-on: ubuntu-latest
    # Code-scanning upload needs to write security events; `actions: read` lets
    # the CodeQL action read the run metadata (avoids the telemetry warning).
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build mollify
        run: cargo build --release -p mollify-cli
      - name: Audit (SARIF)
        run: |
          ./target/release/mollify audit --path . --format sarif > mollify.sarif || true
      - name: Upload SARIF to code scanning
        # Code scanning is free on PUBLIC repos; on private repos it needs
        # GitHub Advanced Security (paid). Skip while private and on PRs (which
        # may come from forks without write access) — this auto-activates once
        # the repo is public, no workflow change needed.
        if: ${{ github.event_name == 'push' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: mollify.sarif
        continue-on-error: true
