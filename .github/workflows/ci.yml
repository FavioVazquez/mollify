name: CI

on:
  push:
    branches: [main, research-and-plan]
  pull_request:

# Least privilege by default; the SARIF upload job widens its own scope below.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build · test · clippy · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Version consistency (workspace / crate deps)
        run: ./scripts/check-versions.sh

  self-audit:
    name: mollify audits a sample project (dogfood)
    runs-on: ubuntu-latest
    # Code-scanning upload needs to write security events; `actions: read` lets
    # the CodeQL action read the run metadata (avoids the telemetry warning).
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build mollify
        run: cargo build --release -p mollify-cli
      - name: Audit (SARIF)
        run: |
          ./target/release/mollify audit --path . --format sarif > mollify.sarif || true
      - name: Upload SARIF to code scanning
        # Code scanning is free on PUBLIC repos; on private repos it needs
        # GitHub Advanced Security (paid). Skip while private and on PRs (which
        # may come from forks without write access) — this auto-activates once
        # the repo is public, no workflow change needed.
        if: ${{ github.event_name == 'push' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: mollify.sarif
        continue-on-error: true
