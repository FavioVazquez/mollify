# Build per-platform `mollify` binaries, wrap them as `@mollify-cli/<suffix>`
# npm packages, and publish them plus the `mollify` meta-package on a version tag.
#
# After release: `npm install --save-dev mollify` (or pnpm/yarn/bun) installs the
# CLI + the matching platform binary; `npx mollify-mcp` / `npx mollify-lsp` work.
name: npm release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build · ${{ matrix.suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { suffix: linux-x64-gnu, target: x86_64-unknown-linux-gnu, runner: ubuntu-latest, cross: true }
          - { suffix: linux-arm64-gnu, target: aarch64-unknown-linux-gnu, runner: ubuntu-latest, cross: true }
          - { suffix: linux-x64-musl, target: x86_64-unknown-linux-musl, runner: ubuntu-latest, cross: true }
          - { suffix: linux-arm64-musl, target: aarch64-unknown-linux-musl, runner: ubuntu-latest, cross: true }
          - { suffix: darwin-x64, target: x86_64-apple-darwin, runner: macos-latest, cross: false }
          - { suffix: darwin-arm64, target: aarch64-apple-darwin, runner: macos-latest, cross: false }
          - { suffix: win32-x64-msvc, target: x86_64-pc-windows-msvc, runner: windows-latest, cross: false }
          - { suffix: win32-arm64-msvc, target: aarch64-pc-windows-msvc, runner: windows-latest, cross: false }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p mollify-cli --target ${{ matrix.target }}
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p mollify-cli --target ${{ matrix.target }}
      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/mollify"
          [ "${{ runner.os }}" = "Windows" ] && BIN="${BIN}.exe"
          node npm/mollify/scripts/make-platform-package.mjs \
            "${{ matrix.suffix }}" "${{ steps.ver.outputs.version }}" "$BIN" npm
      - uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.suffix }}
          path: npm/@mollify-cli/${{ matrix.suffix }}

  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Download platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: platform-*
          path: staged
      - name: Set versions
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e '
            const fs=require("fs");
            const v=process.env.VERSION;
            const p="npm/mollify/package.json";
            const j=JSON.parse(fs.readFileSync(p,"utf8"));
            j.version=v;
            for (const k of Object.keys(j.optionalDependencies||{})) j.optionalDependencies[k]=v;
            fs.writeFileSync(p, JSON.stringify(j,null,2)+"\n");
          '
        env:
          VERSION: ${{ github.ref_name }}
      - name: Publish platform packages
        run: |
          for dir in staged/platform-*; do
            npm publish --access public "$dir"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish meta package
        run: npm publish --access public npm/mollify
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
