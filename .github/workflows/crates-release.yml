# Publish the mollify crates to crates.io on a version tag, in dependency order.
#
# After release: `cargo install mollify-cli` builds the same self-contained
# binary as the uv/pip channels (the agent artifacts are embedded from the
# in-crate `assets/`, mirrored by scripts/sync-agent-assets.sh).
#
# Requires a CARGO_REGISTRY_TOKEN secret (crates.io API token) in the `crates-io`
# environment. Crate versions must already be bumped to match the tag.
#
# Security note: this workflow holds publish credentials; pinning third-party
# actions to full commit SHAs (rather than mutable tags) is recommended.
# Dependabot (.github/dependabot.yml) tracks action updates.
name: crates.io release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish in dependency order (idempotent, rate-limit aware)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Leaf crates first, then dependents. `--no-verify` is avoided so each
          # publish is build-checked.
          #
          # Idempotent + resilient: crates.io rate-limits *new* crate publishes
          # (a small burst, then ~1 per 10 min), so a 7-crate first release can
          # hit 429 partway through. We (a) skip any crate whose version is
          # already on crates.io, and (b) retry on failure with a backoff long
          # enough to outlast the new-crate rate window. Safe to re-run.
          VER="$(sed -nE 's/^version = "([0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?)"/\1/p' Cargo.toml | head -1)"
          echo "publishing version $VER"
          UA="mollify-release (github actions)"
          published() {
            local code
            code="$(curl -s -m 15 -A "$UA" -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/$1/$VER")"
            [ "$code" = "200" ]
          }
          publish_one() {
            local crate="$1" attempt
            if published "$crate"; then
              echo "✓ $crate $VER already on crates.io — skipping"; return 0
            fi
            for attempt in $(seq 1 20); do
              if cargo publish -p "$crate"; then echo "✓ published $crate"; return 0; fi
              # A 429 (or a flake) — but the upload may have actually landed.
              if published "$crate"; then echo "✓ $crate is now live — continuing"; return 0; fi
              echo "× $crate failed (attempt $attempt) — likely the new-crate rate limit; sleeping 60s"
              sleep 60
            done
            echo "::error::gave up publishing $crate after retries"; return 1
          }
          for crate in mollify-types mollify-parse mollify-graph mollify-core mollify-mcp mollify-lsp mollify-cli; do
            echo "::group::publish $crate"
            publish_one "$crate"
            echo "::endgroup::"
            sleep 20
          done
